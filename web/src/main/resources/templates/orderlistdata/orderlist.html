<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>包裹事項清單</title>
    <script th:src="@{https://cdnjs.cloudflare.com/ajax/libs/Chart.js/2.9.3/Chart.min.js}"></script>
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
    <script th:src="@{/js/bootstrap.min.js}"></script>
    <style>
        /* 自定義樣式 */
        .custom-container {
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .chart-body {
            display: inline-block;
            width: 80%; /* 圖表本身寬度 */
            margin-top: 20px; /* 上方間距 */
            margin-bottom: 20px; /* 下方間距 */
        }
        .chart-box {
            width: 60%; /* 圖表容器寬度 */
            margin: 0 auto; /* 水平置中 */
            text-align: center; /* 內容置中 */
        }

        /* 移除連結的底線 */
        a.card {
            text-decoration: none;
        }

        /* 讓連結內的數字顏色為藍色 */
        a.card .card-title:first-child {
            color: blue;
        }
        .announcement {
            margin-bottom: 20px;
            padding: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        /* 修改卡片標題和內容的字體大小 */
        .card-title{
            font-size: 16px;
        }
        .card-text {
            font-size: 12px; /* 這裡設置你想要的字體大小 */
        }

    </style>
</head>
    <body>
        <header th:include="~{common/header}"></header>
        <!-- side bar 功能-->
        <div th:include="~{common/sidebar}"></div>


        <!--待辦事項清單-->
        <div class="custom-container">
            <div class="row">
                <a href="#" class="card text-center" style="width: 18rem;">
                    <div class="card-body">
                        <h5 class="card-title">0</h5>
                        <h5 class="card-title">待付款訂單</h5>
                    </div>
                </a>
                <a href="#" class="card text-center" style="width: 18rem;">
                    <div class="card-body">
                        <h5 class="card-title">0</h5>
                        <h5 class="card-title">待處理訂單</h5>
                    </div>
                </a>
                <a href="#" class="card text-center" style="width: 18rem;">
                    <div class="card-body">
                        <h5 class="card-title">0</h5>
                        <h5 class="card-title">已處理訂單</h5>
                    </div>
                </a>
                <a href="#" class="card text-center" style="width: 18rem;">
                    <div class="card-body">
                        <h5 class="card-title">0</h5>
                        <h5 class="card-title">待取消訂單</h5>
                    </div>
                </a>

            </div>
        </div>

        <div th:include="~{orderlistdata/common/staticcenter}"></div>
        <div th:include="~{orderlistdata/common/announcementlist}"></div>
        <div th:if="${deleteFailed}">
            <p>刪除失敗，請重試。</p>
        </div>



    </body>
</html>
